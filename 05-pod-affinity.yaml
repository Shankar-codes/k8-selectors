apiVersion: v1
kind: Pod
metadata:
  name: pod-affinity-1
  labels:
    app: pod-1
spec:
  containers:
  - name: nginx
    image: nginx
    imagePullPolicy: Always

---

apiVersion: v1
kind: Pod
metadata:
  name: pod-affinity-2
spec:
  affinity:
    podAffinity: 
      requiredDuringSchedulingIgnoredDuringExecution:
        # pod labels
      - labelSelector:
          matchExpressions:
          - key: app
            operator: In
            values:
            - pod-1
      topologyKey: topology.kubernetes.io/zone
  containers:
  - name: nginx
    image: nginx
    imagePullPolicy: Always