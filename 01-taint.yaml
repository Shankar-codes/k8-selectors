apiVersion: apps/v1
kind: Deployment
metadata:
  name: nginx
  # replicaset labels
  labels:
    purpose: deployment
    project: headless-service-demo
spec:
  replicas: 1 #create 3 pods of replica
  selector:
    # these labels are used to select the pods
    matchLabels:
      purpose: deployment
      project: headless-service-demo
# pod definition      
  template:
    metadata:
      labels:
        purpose: deployment
        project: headless-service-demo
    spec:
      containers:
      - name: nginx
        image: nginx:trixie-perl
